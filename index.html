<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='bgGrad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%232e7d32'/%3E%3Cstop offset='100%25' stop-color='%231b5e20'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='30' fill='url(%23bgGrad)'/%3E%3Cpath d='M14 44 V22 C14 20.895 14.895 20 16 20 C22 20 28 22 32 24 C36 22 42 20 48 20 C49.105 20 50 20.895 50 22 V44 C50 45.105 49.105 46 48 46 C42 46 36 44 32 42 C28 44 22 46 16 46 C14.895 46 14 45.105 14 44 Z' fill='%23ffffff'/%3E%3Cpath d='M32 24 V42' stroke='%232e7d32' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M36 28 h10 M38 32 h8 M36 36 h10' stroke='%234caf50' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M18 28 h10 M20 32 h8 M18 36 h10' stroke='%234caf50' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M40 14 V26 L43 23 L46 26 V14 Z' fill='%23ffca28' stroke='%23ffffff' stroke-width='1'/%3E%3C/svg%3E">
    <!-- 1. Basic SEO & Browser Title -->
    <title>AQR - Al Quran Reader</title>
    <meta name="description" content="A beautiful, clean, and modern Al Quran Reader with Arabic text and English translations.">

    <!-- 2. Browser Favicon (Your SVG is fine here) -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="favicon-16x16.png" sizes="16x16">

    <!-- 3. Apple iOS "Add to Home Screen" Icon (MUST BE PNG, 180x180px) -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AQR Quran">

    <!-- 4. Android Chrome "Add to Home Screen" (Requires a manifest.json file) -->

    <!-- 5. Open Graph / WhatsApp / Discord Link Previews (MUST BE PNG/JPG, 1200x630px recommended) -->
    <meta property="og:type" content="website">

    <meta property="og:image" content="https://your-domain.com/cover-image.png">

    <!-- 6. Twitter Card Preview -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AQR - Al Quran Reader">
    <meta name="twitter:description" content="Read the full Quran with a beautiful Green/White UI.">
    <meta name="twitter:image" content="https://your-domain.com/cover-image.png">
    <title>AQR</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #2e7d32;
            --light-green: #4caf50;
            --dark-green: #1b5e20;
            --white: #ffffff;
            --light-gray: #f5f5f5;
            --gray: #9e9e9e;
            --text-dark: #333333;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 4px 16px rgba(46, 125, 50, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #ffffff 100%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
            color: var(--white);
            padding: 30px 0;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo svg {
            width: 50px;
            height: 50px;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .logo p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--white);
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            background: var(--light-green);
            color: var(--white);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: var(--primary-green);
            color: var(--white);
            box-shadow: var(--shadow-hover);
        }

        .tab-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Search Section */
        .search-section {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border: 2px solid var(--light-gray);
            border-radius: 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }

        .search-btn {
            background: var(--primary-green);
            color: var(--white);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-btn:hover {
            background: var(--dark-green);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        /* Surah List */
        .surah-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .surah-card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary-green);
        }

        .surah-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-5px);
            border-left-width: 6px;
        }

        .surah-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .surah-number {
            background: var(--primary-green);
            color: var(--white);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .surah-info {
            text-align: right;
        }

        .surah-name-ar {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--dark-green);
            margin-bottom: 5px;
        }

        .surah-name-en {
            font-size: 1rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        .surah-meta {
            font-size: 0.85rem;
            color: var(--gray);
            margin-top: 5px;
        }

        /* Surah Reader */
        .surah-reader {
            display: none;
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .surah-reader.active {
            display: block;
        }

        .reader-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--light-gray);
        }

        .reader-header h2 {
            font-size: 2rem;
            color: var(--dark-green);
            margin-bottom: 10px;
        }

        .reader-header .arabic-title {
            font-size: 2.5rem;
            color: var(--primary-green);
            font-weight: bold;
        }

        .back-btn {
            background: var(--light-gray);
            color: var(--text-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: var(--gray);
            color: var(--white);
        }

        .ayah {
            background: var(--light-gray);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid var(--light-green);
            transition: all 0.3s ease;
        }

        .ayah:hover {
            box-shadow: var(--shadow-hover);
            border-left-color: var(--primary-green);
        }

        .ayah-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--gray);
        }

        .ayah-number {
            background: var(--primary-green);
            color: var(--white);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .ayah-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: var(--white);
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--primary-green);
            color: var(--white);
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
        }

        .arabic-text {
            font-size: 1.8rem;
            line-height: 2.5;
            text-align: right;
            direction: rtl;
            color: var(--text-dark);
            margin-bottom: 15px;
            font-family: 'Traditional Arabic', 'Arabic Typesetting', serif;
        }

        .translation-text {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-dark);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }

        .spinner {
            border: 4px solid var(--light-gray);
            border-top: 4px solid var(--primary-green);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Search Results */
        .search-results {
            display: none;
        }

        .search-results.active {
            display: block;
        }

        .result-item {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            box-shadow: var(--shadow-hover);
            transform: translateX(5px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .nav-tabs {
                justify-content: center;
            }

            .surah-list {
                grid-template-columns: 1fr;
            }

            .arabic-text {
                font-size: 1.5rem;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Juz Info */
        .juz-info {
            background: linear-gradient(135deg, var(--light-green), var(--primary-green));
            color: var(--white);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .juz-info h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" fill="#ffffff" stroke="#2e7d32" stroke-width="3" />
                        <path d="M30 40 L50 30 L70 40 L70 60 L50 70 L30 60 Z" fill="#2e7d32" />
                        <path d="M50 30 L50 70" stroke="#ffffff" stroke-width="2" />
                        <path d="M40 35 L60 35" stroke="#ffffff" stroke-width="2" />
                        <circle cx="50" cy="50" r="5" fill="#ffffff" />
                    </svg>
                    <div>
                        <h1>AQR</h1>
                        <p>Al Quran Reader</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('home')">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3l-10 9h3v8h6v-6h2v6h6v-8h3l-10-9z" />
                </svg>
                All Surahs
            </button>
            <button class="tab-btn" onclick="switchTab('search')">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 001.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 00-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 005.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                </svg>
                Search
            </button>
            <button class="tab-btn" onclick="switchTab('bookmarks')">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z" />
                </svg>
                Bookmarks
            </button>
        </div>

        <div id="home" class="tab-content active">
            <div id="surahList" class="surah-list"></div>
        </div>

        <div id="search" class="tab-content" style="display: none;">
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search for any word or phrase in the Quran...">
                    <button class="search-btn" onclick="searchQuran()">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 001.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 00-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 005.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                        </svg>
                        Search
                    </button>
                </div>
            </div>
            <div id="searchResults" class="search-results"></div>
        </div>

        <div id="bookmarks" class="tab-content" style="display: none;">
            <div id="bookmarksList"></div>
        </div>

        <div id="surahReader" class="surah-reader">
            <button class="back-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                </svg>
                Back to Surahs
            </button>
            <div id="readerContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.alquran.cloud/v1';
        let currentSurah = null;
        let bookmarks = JSON.parse(localStorage.getItem('quranBookmarks')) || [];

        // SVG Icons
        const icons = {
            play: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
            bookmark: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>',
            share: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>'
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            loadSurahs();
            renderBookmarks();
        });

        // Load all Surahs
        async function loadSurahs() {
            const surahList = document.getElementById('surahList');
            surahList.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading Surahs...</p></div>';

            try {
                const response = await fetch(`${API_BASE}/surah`);
                const data = await response.json();

                if (data.code === 200) {
                    renderSurahList(data.data);
                } else {
                    throw new Error('Failed to load surahs');
                }
            } catch (error) {
                surahList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                        <h3>Failed to load Surahs</h3>
                        <p>Please check your internet connection and try again.</p>
                    </div>
                `;
            }
        }

        // Render Surah List
        function renderSurahList(surahs) {
            const surahList = document.getElementById('surahList');
            surahList.innerHTML = surahs.map(surah => `
                <div class="surah-card" onclick="loadSurah(${surah.number})">
                    <div class="surah-header">
                        <div class="surah-number">${surah.number}</div>
                        <div class="surah-info">
                            <div class="surah-name-ar">${surah.name}</div>
                            <div class="surah-name-en">${surah.englishName}</div>
                        </div>
                    </div>
                    <div class="surah-meta">
                        ${surah.englishNameTranslation} • ${surah.numberOfAyahs} Ayahs • ${surah.revelationType}
                    </div>
                </div>
            `).join('');
        }

        // Load specific Surah
        async function loadSurah(surahNumber) {
            const reader = document.getElementById('surahReader');
            const content = document.getElementById('readerContent');

            // Hide main content
            document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
            reader.classList.add('active');

            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading Surah...</p></div>';

            try {
                const response = await fetch(`${API_BASE}/surah/${surahNumber}/en.sahih`);
                const data = await response.json();

                if (data.code === 200) {
                    currentSurah = data.data;
                    renderSurah(data.data);
                } else {
                    throw new Error('Failed to load surah');
                }
            } catch (error) {
                content.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                        </svg>
                        <h3>Failed to load Surah</h3>
                        <p>Please check your internet connection and try again.</p>
                    </div>
                `;
            }
        }

        // Render Surah content
        function renderSurah(surah) {
            const content = document.getElementById('readerContent');
            const ayahs = surah.ayahs.map(ayah => `
                <div class="ayah">
                    <div class="ayah-header">
                        <div class="ayah-number">Ayah ${ayah.numberInSurah}</div>
                        <div class="ayah-actions">
                            <button class="action-btn" onclick="toggleBookmark(${surah.number}, ${ayah.numberInSurah})" title="Bookmark">
                                ${icons.bookmark}
                            </button>
                            <button class="action-btn" onclick="shareAyah('${surah.englishName}', ${ayah.numberInSurah})" title="Share">
                                ${icons.share}
                            </button>
                        </div>
                    </div>
                    <div class="arabic-text">${ayah.text}</div>
                    <div class="translation-text">${ayah.text}</div>
                </div>
            `).join('');

            content.innerHTML = `
                <div class="reader-header">
                    <h2 class="arabic-title">${surah.name}</h2>
                    <h2>${surah.englishName}</h2>
                    <p>${surah.englishNameTranslation} • ${surah.numberOfAyahs} Ayahs • ${surah.revelationType}</p>
                </div>
                ${ayahs}
            `;
        }

        // Search Quran
        async function searchQuran() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('searchResults');

            if (!query) {
                resultsDiv.innerHTML = '<div class="empty-state"><p>Please enter a search term</p></div>';
                resultsDiv.classList.add('active');
                return;
            }

            resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching...</p></div>';
            resultsDiv.classList.add('active');

            try {
                const response = await fetch(`${API_BASE}/search/${encodeURIComponent(query)}/all/en`);
                const data = await response.json();

                if (data.code === 200 && data.data.matches.length > 0) {
                    renderSearchResults(data.data.matches);
                } else {
                    resultsDiv.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 001.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 00-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 005.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                            </svg>
                            <h3>No results found</h3>
                            <p>Try searching with different keywords</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="empty-state">
                        <h3>Search failed</h3>
                        <p>Please check your internet connection and try again.</p>
                    </div>
                `;
            }
        }

        // Render search results
        function renderSearchResults(matches) {
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = matches.slice(0, 20).map(match => `
                <div class="result-item" onclick="loadSurah(${match.surah.number})">
                    <div class="ayah-header">
                        <div class="ayah-number">${match.surah.englishName} ${match.numberInSurah}</div>
                    </div>
                    <div class="arabic-text">${match.text}</div>
                    <div class="translation-text">${match.text}</div>
                </div>
            `).join('');
        }

        // Switch tabs
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.style.display = 'none';
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            const selectedTab = document.getElementById(tabName);
            selectedTab.style.display = 'block';
            selectedTab.classList.add('active');

            event.target.closest('.tab-btn').classList.add('active');

            document.getElementById('surahReader').classList.remove('active');
        }

        // Go back to surah list
        function goBack() {
            document.getElementById('surahReader').classList.remove('active');
            document.getElementById('home').style.display = 'block';
            currentSurah = null;
        }

        // Bookmark functions
        function toggleBookmark(surahNumber, ayahNumber) {
            const bookmarkId = `${surahNumber}:${ayahNumber}`;
            const index = bookmarks.indexOf(bookmarkId);

            if (index > -1) {
                bookmarks.splice(index, 1);
            } else {
                bookmarks.push(bookmarkId);
            }

            localStorage.setItem('quranBookmarks', JSON.stringify(bookmarks));
            renderBookmarks();
        }

        function renderBookmarks() {
            const bookmarksDiv = document.getElementById('bookmarksList');

            if (bookmarks.length === 0) {
                bookmarksDiv.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                        </svg>
                        <h3>No Bookmarks</h3>
                        <p>Bookmark your favorite Ayahs for quick access</p>
                    </div>
                `;
                return;
            }

            bookmarksDiv.innerHTML = bookmarks.map(bookmark => {
                const [surah, ayah] = bookmark.split(':');
                return `
                    <div class="result-item" onclick="loadSurah(${surah})">
                        <div class="ayah-header">
                            <div class="ayah-number">Surah ${surah}, Ayah ${ayah}</div>
                        </div>
                        <p>Click to read</p>
                    </div>
                `;
            }).join('');
        }

        // Share Ayah
        function shareAyah(surahName, ayahNumber) {
            const text = `${surahName}, Ayah ${ayahNumber}`;
            if (navigator.share) {
                navigator.share({
                    title: 'Al Quran Reader',
                    text: text,
                });
            } else {
                navigator.clipboard.writeText(text);
                alert('Ayah reference copied to clipboard!');
            }
        }

        // Enter key for search
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchQuran();
            }
        });
    </script>
</body>

</html>
